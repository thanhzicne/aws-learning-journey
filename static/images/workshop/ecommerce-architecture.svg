<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="680" viewBox="0 0 1180 680" role="img" aria-label="AWS e-commerce architecture">
  <rect width="1180" height="680" fill="#f7f8fb"/>
  <text x="590" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#232f3e">AWS E-commerce Learning Platform</text>
  <rect x="46" y="86" width="1088" height="520" rx="10" fill="#fff" stroke="#8796a8" stroke-width="2"/>
  <text x="70" y="120" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#232f3e">VPC 10.0.0.0/16</text>
  <rect x="86" y="152" width="470" height="382" rx="8" fill="#eef7ff" stroke="#2f80ed"/>
  <text x="106" y="184" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1f5fa8">Public subnets</text>
  <rect x="626" y="152" width="430" height="382" rx="8" fill="#f1fbf1" stroke="#3a9f5d"/>
  <text x="646" y="184" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#287a45">Private subnets</text>
  <rect x="136" y="230" width="150" height="78" rx="6" fill="#ff9900"/>
  <text x="211" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111">CloudFront</text>
  <text x="211" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111">+ S3 Frontend</text>
  <rect x="356" y="230" width="150" height="78" rx="6" fill="#ff9900"/>
  <text x="431" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111">EC2</text>
  <text x="431" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#111">Spring Boot API</text>
  <rect x="696" y="230" width="150" height="78" rx="6" fill="#527fff"/>
  <text x="771" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">RDS MySQL</text>
  <text x="771" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Private DB</text>
  <rect x="876" y="230" width="150" height="78" rx="6" fill="#569a31"/>
  <text x="951" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">S3</text>
  <text x="951" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Product images</text>
  <rect x="356" y="392" width="150" height="78" rx="6" fill="#8c4fff"/>
  <text x="431" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">CloudWatch</text>
  <text x="431" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Logs + Metrics</text>
  <rect x="696" y="392" width="150" height="78" rx="6" fill="#dd344c"/>
  <text x="771" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">SNS</text>
  <text x="771" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Alarm email</text>
  <text x="44" y="640" font-family="Arial, sans-serif" font-size="14" fill="#53616f">Flow: User -> CloudFront/S3 frontend -> EC2 API -> RDS. EC2 uploads product images to S3 and writes logs/metrics to CloudWatch.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#232f3e"/></marker>
  </defs>
  <line x1="286" y1="269" x2="356" y2="269" stroke="#232f3e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="506" y1="269" x2="696" y2="269" stroke="#232f3e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="506" y1="292" x2="876" y2="292" stroke="#232f3e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="431" y1="308" x2="431" y2="392" stroke="#232f3e" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="506" y1="431" x2="696" y2="431" stroke="#232f3e" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
